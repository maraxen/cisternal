Add audit parent item if missing. Mark M12 #2665 completed (commits c0eca94..5e05e87).
Register #2666 native-validate expansion and #2667 docs hygiene as open P3 children.
Close/dedup orphan items 2661/2662 if stale.
"""

[[tracks]]
id = "d"
name = "loop-closeout"
agent = "orchestrator"
depends_on = ["b"]
prompt = """
Update loop_priorities.toml m12_export_rust_bridge_complete = true.
Update loop_state.toml: current_phase=TRIAGE, epic_audit_verdict=APPROVE.
Update triage cache commit hash to 5e05e87.
Add lesson + debt followups.
"""

[reviewer_prompt]
checklist = [
  "AC-AUDIT-1 default_ci green",
  "AC-AUDIT-2 research memo PASS rows cited",
  "AC-AUDIT-3 backlog hygiene",
  "AC-AUDIT-4 loop files updated",
  "AC-AUDIT-5 no feature scope creep",
]

verdict_gate = "ACCEPT"

[[tracks]]
id = "a"
name = "mechanical-verify"
agent = "reviewer"
depends_on = []
prompt = """
Run default_ci: uv run pytest -q && uv run ruff check .
Grep .github for continue-on-error (expect zero).
Confirm rust-parity job blocking per test_workflow_export_dogfood.py.
"""

[[tracks]]

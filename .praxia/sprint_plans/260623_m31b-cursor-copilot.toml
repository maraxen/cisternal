[sprint]
sprint_id = "260623_m31b-cursor-copilot"
sprint_num = 3
name = "Cisterna M3.1b — Cursor + Copilot emitters"
description = "Four sequential waves implementing M3.1b per rev3 spec (backlog #2487). CursorEmitter → CopilotEmitter + hook filter → CLI/golden → regression."
context = '''
Project: cisterna (Python 3.13, uv/pytest/ruff). Authoritative spec:
.praxia/docs/specs/260623_m31b-buildable-spec-rev3.md (PI-approved).

M3.1a baseline: 253 tests green; CompositeAssetSource; validate/inspect CLI;
ClaudeEmitter + golden claude/{names_only,with_command_bodies}; manifest_minimal fixture.

Stack rules: uv run pytest; uv run ruff check .; never bare python.
Praxia ports: bundle_cursor.rs, bundle_copilot.rs, hooks_emit.rs (filter copilot in cisterna per L15).
Do NOT implement Antigravity (#2559 M3.1c) in this sprint.
Preserve Claude default: ClaudeEmitter() + claude golden unchanged (AC-M31b-5 / N12).
Locked: L15-L21 (fail-closed cursor only, no provenance on cursor/copilot, commands claude-only).
'''
max_fix_retries = 1

# ============================================================
# WAVE 1 — N9: CursorEmitter + L17 fail-closed
# ============================================================
[[tracks]]
id = "w1"
is_research = false

[[tracks.items]]
backlog_id = "2487"
phase_name = "M3.1b-W1 — CursorEmitter + fail-closed (L17)"
fixer_prompt = '''
task_id: 260623_m31b-brainstorm

## Objective
Implement CursorEmitter (N9) porting praxia bundle_cursor.rs with cisterna L17
fail-closed: omit agents/skills keys when files not emitted (AC-M31b-6).

## Anchors
- src/cisterna/export/claude.py — ClaudeEmitter pattern
- src/cisterna/export/base.py — Emitter ABC
- praxia: bundle_cursor.rs (dual hooks: plugin.json + .cursor/hooks.json)
- Spec rev3 § CursorEmitter, L17, L18 (no provenance sidecar)

## Tasks
1. Create src/cisterna/export/cursor.py — CursorEmitter.emit(bundle) -> dict[str,str]
2. Emit .cursor-plugin/plugin.json (agents/skills/hooks/mcpServers keys absent when empty)
3. Emit agents/<n>.agent.md and skills/<n>/SKILL.md only when body non-empty
4. Emit .cursor/hooks.json camelCase v1 + inline hooks in plugin.json (praxia parity)
5. Emit .mcp.json when mcp_servers non-empty
6. No cisterna-provenance.json (L18)
7. tests/test_export_cursor.py — AC-M31b-1, AC-M31b-6 using manifest_minimal bundle

## Constraints
- Pure emit (no I/O); never-raise
- Do not add --surface CLI yet (W3)
- Run: uv run ruff check . && uv run pytest

## Commit
feat(export): CursorEmitter with fail-closed manifest keys (#2487 W1)
'''
reviewer_prompt = '''
VERIFY:
1. CursorEmitter exists in src/cisterna/export/cursor.py
2. AC-M31b-1: manifest_minimal bundle emits plugin.json + hooks + agent/skill files
3. AC-M31b-6: agents key absent when agent bodies would not be emitted
4. No provenance sidecar in cursor output
5. uv run pytest full suite green; ruff clean

PASS if all VERIFY satisfied.
'''


task_id: 260616_cisterna-m1-sprint2

## Objective
Implement the CLI timing adapter per spec §4.2, gate AC-CLI-1. Foundation and adapter
base are already built. Only create new files.

## Files to create

### src/cisterna/adapters/cli.py
CliAdapter + timed_command decorator:

```python
import functools, time
from cisterna.adapters.base import AdapterBase
from cisterna import emit_event

class CliAdapter(AdapterBase):
    ALLOWED_NAMES = frozenset({"cli.cmd_start", "cli.cmd_end"})
    def shape_ok(self, tool_name, result): return None
    def shape_error(self, tool_name, exc, **fields): return None

def timed_command(cmd_name: str | None = None):
    def decorator(fn):
        name = cmd_name or fn.__name__
        @functools.wraps(fn)
        def wrapper(*args, **kwargs):
            emit_event("cli.cmd_start", cmd=name)
            t0 = time.monotonic_ns()
            try:
                result = fn(*args, **kwargs)
                emit_event("cli.cmd_end", cmd=name,
                           duration_ms=(time.monotonic_ns() - t0) / 1e6, ok=True)
                return result
            except Exception as exc:
                emit_event("cli.cmd_end", cmd=name,
                           duration_ms=(time.monotonic_ns() - t0) / 1e6,
                           ok=False, exc_type=type(exc).__name__)
                raise
        return wrapper
    return decorator
```

Note: timed_command RE-RAISES on exception (CLI commands own their exit code; unlike MCP
adapters, no shielding). CliAdapter.shape_ok/shape_error are no-ops (the decorator is the
actual entry point).


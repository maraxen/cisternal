2. _maybe_warn_ec3() throttles to once per 60s via _last_ec3_warn.
3. Warning message contains "EC-3" or "pipeline consumer dead".
4. _probe_liveness (or equivalent heartbeat callback) calls _maybe_warn_ec3() at its end.
5. test_ec3_warn_emits_stderr passes and asserts stderr content.
6. Full `uv run pytest` green; `uv run ruff check .` clean.

## Pass criterion
EC-3 warn policy present and tested; all tests green; ruff clean.
'''

fixer_prompt = '''
task_id: 260616_cisterna-m1-sprint2

## Objective
Implement the EC-3 dead-pipeline warn policy per spec §7.3 (warn-and-continue; no
auto-restart in M1). The liveness probe already exists and passes AC-SELFCHECK-1/2.
Edit ONLY src/cisterna/telemetry/self_obs.py; add one test to tests/test_selfcheck.py.

## Change — src/cisterna/telemetry/self_obs.py

Add two module-level items:
  _last_ec3_warn: float = 0.0   # timestamp of last EC-3 warning

Add two functions:

def _check_ec3_warn() -> None:
    """Emit a stderr warning if pipeline consumer is dead and liveness is stale."""
    import sys, time
    from cisterna.telemetry import pipeline as _pipeline_mod
    p = _pipeline_mod.get_pipeline()
    if p is None or p.is_alive():
        return
    with _heartbeat_lock:
        last_growth = _last_stat.get("last_growth_ts")
        interval = _heartbeat_interval
    if last_growth is None:
        return
    if time.time() - last_growth > 2 * interval:
        print(
            "[cisterna] WARNING: pipeline consumer dead "
            f"(staleness={(time.time() - last_growth):.1f}s); "
            "EC-3: warn-and-continue policy active",
            file=sys.stderr,
        )

def _maybe_warn_ec3() -> None:
    """Throttle EC-3 warning to at most once per 60s."""
    global _last_ec3_warn
    import time
    now = time.time()
    if now - _last_ec3_warn < 60.0:
        return
    _last_ec3_warn = now
    _check_ec3_warn()

Call `_maybe_warn_ec3()` at the end of the `_probe_liveness` function (the function that
runs the mtime/size check inside the heartbeat thread). Find the probe function in the
existing code and append the call there.

Also: expose `_last_ec3_warn` reset in the cleanup block (add
`self_obs_module._last_ec3_warn = 0.0` to the test cleanup fixture in test_selfcheck.py).

## Test — tests/test_selfcheck.py
Add one test to the existing file:

def test_ec3_warn_emits_stderr(temp_log_dir, capsys):
    """EC-3: when pipeline listener is dead and liveness is stale, a warning appears on stderr."""
    from cisterna.telemetry import self_obs as self_obs_module, pipeline as pipeline_module

    init(log_dir=temp_log_dir, heartbeat_interval=0.05)
    emit_event("initial.event")
    time.sleep(0.15)  # let file grow so last_growth_ts is set

    # Kill the listener thread
    pipeline = pipeline_module._global_pipeline
    if pipeline and pipeline._listener:
        pipeline._listener.stop()
        pipeline._listener.join(timeout=1.0)

    time.sleep(0.15)  # let liveness go stale (> 2x interval)

    # Reset throttle and force check
    self_obs_module._last_ec3_warn = 0.0
    self_obs_module._check_ec3_warn()

    captured = capsys.readouterr()
    assert "EC-3" in captured.err or "pipeline consumer dead" in captured.err

## Success criteria
`uv run pytest` all green. `uv run ruff check .` clean.
'''

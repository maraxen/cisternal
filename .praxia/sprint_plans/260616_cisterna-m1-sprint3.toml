### AC-PERF-1a: emit_event x1000, 2 exporters, median < 1ms

```python
import statistics, time, tempfile
from pathlib import Path
import pytest
from cisterna import init, emit_event
from cisterna.telemetry.exporter import ShadowExporter

class TestAcPerf1a:
    def test_emit_event_median_under_1ms(self, temp_log_dir):
        """Given 2 ShadowExporters; emit_event x1000; median per-call < 1ms (AC-PERF-1a)."""
        shadow1, shadow2 = ShadowExporter(), ShadowExporter()
        # ShadowExporters do no disk I/O — pure enqueue path
        init(log_dir=temp_log_dir, exporters=[shadow1, shadow2], heartbeat_interval=30.0)

        durations_ns = []
        for _ in range(1000):
            t0 = time.perf_counter_ns()
            emit_event("mcp.call_start", tool="bench_tool", request_id="r")
            durations_ns.append(time.perf_counter_ns() - t0)

        median_ms = statistics.median(durations_ns) / 1_000_000
        assert median_ms < 1.0, (
            f"Median emit_event call {median_ms:.4f}ms >= 1ms; check queue or lock contention"
        )
```

### AC-PERF-1b: CisternaMiddleware, 500 on_call_tool awaits, median < 1ms

```python
import asyncio, statistics, time
from unittest.mock import Mock
from cisterna.adapters.v3_middleware import CisternaMiddleware

class TestAcPerf1b:
    def test_middleware_overhead_median_under_1ms(self, temp_log_dir):
        """CisternaMiddleware on_call_tool x500; median overhead < 1ms (AC-PERF-1b)."""
        from cisterna.telemetry.exporter import ShadowExporter
        shadow = ShadowExporter()
        init(log_dir=temp_log_dir, exporters=[shadow], heartbeat_interval=30.0)

        middleware = CisternaMiddleware()
        ctx = Mock()
        ctx.message.name = "bench_tool"
        ctx.message.arguments = {}

        async def call_next(_): return {}

        async def run():
            durations_ns = []
            for _ in range(500):
                t0 = time.perf_counter_ns()
                await middleware.on_call_tool(ctx, call_next)
                durations_ns.append(time.perf_counter_ns() - t0)
            return durations_ns

        durations_ns = asyncio.run(run())
        median_ms = statistics.median(durations_ns) / 1_000_000
        assert median_ms < 1.0, (
            f"Median middleware overhead {median_ms:.4f}ms >= 1ms"
        )
```

### AC-PERF-1c: queue capacity 10, 100 events, drop_count >= 90

```python
from cisterna.telemetry.pipeline import EventPipeline
from cisterna.telemetry.context import _build_record
import time as _time

class TestAcPerf1c:
    def test_drop_on_full_no_exception(self):
        """Queue size 10, 100 rapid emits; drop_count >= 90; no exception (AC-PERF-1c)."""
        shadow = ShadowExporter()
        # Create pipeline directly with tiny queue
        pipeline = EventPipeline(queue_size=10, exporters=[shadow])

        # Build a minimal record to emit
        import time
        record = _build_record("mcp.call_start", ts=time.time(), tool="t", request_id="r")

        # Rapid-fire 100 emits into the tiny queue before it can drain
        for _ in range(100):
            pipeline.emit(record)

        # Drain is async; wait briefly for consumer
        time.sleep(0.1)

        # At least 90 should have dropped (queue fills after 10)
        assert pipeline.drop_count >= 90, (
            f"drop_count={pipeline.drop_count}, expected >= 90 "
            "(queue size 10, 100 rapid emits)"
        )

        pipeline.shutdown()
```


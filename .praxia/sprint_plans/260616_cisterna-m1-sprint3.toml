### tests/shadow/harness.py
Shadow harness utilities (spec §6.1-6.3):

```python
import logging
from contextlib import contextmanager
from typing import Iterator

from cisterna.telemetry.record import Record


@contextmanager
def capture_legacy(consumer: str) -> Iterator[list[logging.LogRecord]]:
    """Attach a spy logging.Handler to consumer's logger; yield collected records."""
    logger = logging.getLogger(consumer)
    original_level = logger.level
    logger.setLevel(logging.DEBUG)
    records: list[logging.LogRecord] = []

    class _Handler(logging.Handler):
        def emit(self, record: logging.LogRecord) -> None:
            records.append(record)

    handler = _Handler()
    logger.addHandler(handler)
    try:
        yield records
    finally:
        logger.removeHandler(handler)
        logger.setLevel(original_level)


def assert_parity(
    legacy: list[logging.LogRecord],
    cisterna_records: list[Record],
    *,
    duration_tolerance_ms: float = 5.0,
) -> None:
    """Assert field-subset parity between legacy log records and cisterna Records.

    Parity = matching tool names + duration within tolerance (spec §6.3).
    Counts need not be equal (cisterna emits start+end; legacy may emit once).
    At least one legacy record must match at least one cisterna record on tool name.
    """
    assert len(legacy) >= 1, "Legacy stream must have at least one record"
    assert len(cisterna_records) >= 1, "Cisterna stream must have at least one record"

    # Collect tool names from legacy (msg may be a dict or a plain string)
    legacy_tools: set[str] = set()
    for lr in legacy:
        msg = lr.getMessage()
        if isinstance(msg, dict):
            tool = msg.get("tool")
        else:
            tool = getattr(lr, "tool", None)
        if tool:
            legacy_tools.add(str(tool))

    # Collect tool names from cisterna
    cisterna_tools: set[str] = {
        r.fields.get("tool", "") for r in cisterna_records if r.fields.get("tool")
    }

    overlap = legacy_tools & cisterna_tools
    assert overlap, (
        f"No matching tool names between legacy {legacy_tools} and cisterna {cisterna_tools}"
    )
```

### tests/shadow/test_bathos_shadow.py
AC-SHADOW-1: bathos stub pattern — logs to "bathos" logger AND emits via cisterna.

```python
import logging
import tempfile
import time
from pathlib import Path

import pytest

from cisterna import emit_event, init
from cisterna.adapters.base import BathosAdapter
from cisterna.adapters.v2_decorator import traced_tool
from cisterna.telemetry.exporter import ShadowExporter
from tests.shadow.harness import assert_parity, capture_legacy

_bathos_logger = logging.getLogger("bathos")


@pytest.fixture
def temp_log_dir():
    with tempfile.TemporaryDirectory() as d:
        yield Path(d)


@pytest.fixture(autouse=True)
def cleanup():
    yield
    from cisterna.telemetry import pipeline as pm, self_obs as so
    if pm._global_pipeline:
        pm._global_pipeline.shutdown()
        pm._global_pipeline = None
    import cisterna.telemetry.self_obs as so_mod
    with so_mod._heartbeat_lock:
        so_mod._heartbeat_thread = None
        so_mod._last_stat = {"mtime": None, "size": None, "ts": None, "last_growth_ts": None}
        so_mod._jsonl_path = None


class TestAcShadow1:
    """AC-SHADOW-1: bathos legacy + cisterna shadow; parity on list_runs_tool."""

    def test_bathos_shadow_parity(self, temp_log_dir):
        """Both streams capture list_runs_tool; tool names match across streams."""
        shadow = ShadowExporter()
        init(log_dir=temp_log_dir, exporters=[shadow], heartbeat_interval=30.0)

        # Stub tool: wraps legacy logging + cisterna in one call (simulating bathos pattern)
        @traced_tool(BathosAdapter())
        def list_runs_tool():
            # Simulate the bathos legacy emit (what bathos currently logs internally)
            _bathos_logger.info(
                "tool call",
                extra={"tool": "list_runs_tool", "event": "call_end", "duration_ms": 0.5},
            )
            return {"runs": []}

        with capture_legacy("bathos") as legacy:
            list_runs_tool()
            time.sleep(0.05)  # let cisterna drain the queue

        # Filter cisterna records to MCP events for this tool
        mcp_records = [
            r for r in shadow.records
            if r.fields.get("tool") == "list_runs_tool"
        ]

        assert len(legacy) >= 1, f"Legacy captured {len(legacy)} records, expected >= 1"
        assert len(mcp_records) >= 1, f"Cisterna captured {len(mcp_records)} records, expected >= 1"

        assert_parity(legacy, mcp_records)

    def test_bathos_shadow_ordering(self, temp_log_dir):
        """Cisterna emits mcp.call_start before mcp.call_end (ordering preserved)."""
        shadow = ShadowExporter()
        init(log_dir=temp_log_dir, exporters=[shadow], heartbeat_interval=30.0)

        @traced_tool(BathosAdapter())
        def list_runs_tool():
            return {"runs": []}

        list_runs_tool()
        time.sleep(0.05)

        tool_records = [r for r in shadow.records if r.fields.get("tool") == "list_runs_tool"]
        names = [r.name for r in tool_records]
        assert "mcp.call_start" in names
        assert "mcp.call_end" in names
        # Start must precede end
        assert names.index("mcp.call_start") < names.index("mcp.call_end")
```


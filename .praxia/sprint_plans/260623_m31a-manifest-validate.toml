## Constraints
- registry_assets() unchanged signature/behavior
- workflows/pipelines/snippets not loaded into IR (L14)
- requires_praxia validation: skip or relax for cisterna test manifests

## Commit
feat(assets): ManifestAssetSource and CompositeAssetSource (#2486 W2)
'''
reviewer_prompt = '''
VERIFY:
1. AssetSource Protocol + ManifestAssetSource + CompositeAssetSource exist

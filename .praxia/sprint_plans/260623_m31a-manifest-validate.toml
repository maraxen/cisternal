is_research = false

[[tracks.items]]
backlog_id = "2486"
phase_name = "M3.1a-W2 — ManifestAssetSource + Composite + registry_bundle"
fixer_prompt = '''
task_id: 260623_autonomous-loop

## Objective
Implement AssetSource Protocol, ManifestAssetSource, registry_bundle(),
CompositeAssetSource per spec L1-L4, L12-L13, composite merge rules.

## Anchors
- src/cisterna/assets/source.py — registry_assets (keep public API)
- src/cisterna/assets/bundle.py — extended IR from W1
- praxia manifest.rs — Manifest, PluginSection, export_command.claude_code

## Tasks
1. Add AssetSource Protocol with load() -> LoadReport (never-raise)
2. Create src/cisterna/assets/manifest.py — parse .praxia/manifest.toml (tomllib):
   skills, agents (tools or frontmatter default_tools), hook_specs, plugin.mcp,
   export_command.claude_code paths → CommandAsset
3. Implement ManifestAssetSource(manifest_path)
4. Implement registry_bundle(registry, metadata=None) -> AssetBundle in source.py
5. Implement CompositeAssetSource(manifest_path, registry) with merge rules +

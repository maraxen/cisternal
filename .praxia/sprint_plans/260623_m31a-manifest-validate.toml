[sprint]
sprint_id = "260623_m31a-manifest-validate"
sprint_num = 2
name = "Cisterna M3.1a — manifest source, validate, capability"
description = "Four sequential waves implementing M3.1a per rev2 spec (backlog #2486). IR extension → manifest/composite sources → capability layer → inspect/validate/golden → Claude command bodies."
context = '''
Project: cisterna (Python 3.13, uv/pytest/ruff). Authoritative spec:
.praxia/docs/specs/260623_m31-buildable-spec.md (rev2, PI-approved).

M3 baseline: 220 tests green; ClaudeEmitter names-only; registry_assets in source.py;
AssetBundle has commands+mcp_servers only.

Stack rules: uv run pytest; uv run ruff check .; never bare python.
Reference: /home/marielle/projects/praxia/crates/praxia-config/src/manifest.rs
Do NOT touch M3.1b emitters (Cursor/Copilot) in this sprint.
Preserve M3 default: ClaudeEmitter() byte-identical to pre-M3.1a (AC-M31a-4).
'''
max_fix_retries = 1

# ============================================================
# WAVE 1 — N0: IR extension + LoadReport + tests
# ============================================================
[[tracks]]
id = "w1"
is_research = false

[[tracks.items]]
backlog_id = "2486"
phase_name = "M3.1a-W1 — IR extension (Skill/Agent/HookSpec/LoadReport)"
fixer_prompt = '''
task_id: 260623_autonomous-loop

## Objective
Implement spec rev2 AssetBundle IR extension (N0): SkillAsset, AgentAsset,
HookSpecAsset, LoadReport; extend AssetBundle with skills/agents/hook_specs
tuples + sort invariants.

## Anchors
- src/cisterna/assets/bundle.py — existing CommandAsset, McpAsset, AssetBundle
- Spec: .praxia/docs/specs/260623_m31-buildable-spec.md § AssetBundle IR extension

## Tasks
1. Add SkillAsset, AgentAsset, HookSpecAsset dataclasses (frozen, slots) to bundle.py
2. Extend AssetBundle with skills, agents, hook_specs tuple fields (default ())
3. Enforce sort invariants in __post_init__: skills/agents by name;
   hook_specs by (event, matcher, script) via object.__setattr__
4. Add LoadReport dataclass (bundle, warnings, conflicts tuples)
5. Export new types from src/cisterna/assets/__init__.py
6. Add tests/test_assets_bundle_m31.py covering sort invariants + hashability

## Constraints
- Do not break existing M3 tests
- No ManifestAssetSource yet — types only
- Run: uv run ruff check . && uv run pytest

## Commit
feat(assets): extend AssetBundle IR for M3.1a (#2486 W1)
'''
reviewer_prompt = '''
VERIFY:
1. SkillAsset, AgentAsset, HookSpecAsset, LoadReport exist in bundle.py
2. AssetBundle has skills/agents/hook_specs with sort invariants
3. Public exports updated in assets/__init__.py
4. tests/test_assets_bundle_m31.py passes
5. uv run pytest full suite green; ruff clean

PASS if all VERIFY satisfied.
'''


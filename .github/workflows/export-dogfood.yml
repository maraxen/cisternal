name: export-dogfood

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dogfood:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Telemetry doctor preflight (M10.3)
        env:
          CISTERNA_TELEMETRY: all
        run: uv run cisterna telemetry doctor --json --strict
      - run: uv run ruff check .
      - run: uv run pytest -q
      - name: Shadow telemetry parity (bathos + contemplex patterns)
        run: uv run pytest tests/shadow/ -q
      - name: Golden matrix (export trust)
        run: uv run pytest -m golden_matrix -q
      - name: Dry-run export self-manifest
        run: |
          uv run cisterna assets export \
            --manifest .praxia/manifest.toml --surface claude --dry-run | grep -q .
      - name: Install and test minimal_emitter example
        run: |
          uv pip install -e examples/minimal_emitter
          uv run pytest examples/minimal_emitter/tests/ -q

  native-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - name: Native CLI parity (claude)
        run: |
          uv run cisterna assets validate \
            --manifest .praxia/manifest.toml --surface claude --use-native-cli
          uv run cisterna assets validate \
            --manifest .praxia/manifest.toml --surface claude \
            --emit-command-bodies --use-native-cli

  otlp-collector:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - name: Start otel-collector
        run: |
          docker run -d --name cisterna-otel \
            -p 4317:4317 -p 4318:4318 \
            -v "${{ github.workspace }}/tests/fixtures/otel-collector-config.yaml:/etc/otelcol/config.yaml" \
            otel/opentelemetry-collector:0.109.0 \
            --config=/etc/otelcol/config.yaml
          for i in $(seq 1 30); do
            if nc -z localhost 4317 2>/dev/null && nc -z localhost 4318 2>/dev/null; then
              echo "collector ready (gRPC 4317 + HTTP 4318)"
              exit 0
            fi
            sleep 1
          done
          echo "collector did not become ready in time (need 4317 and 4318)"
          docker logs cisterna-otel || true
          exit 1
      - name: OTLP gRPC + HTTP integration smoke
        run: uv run pytest tests/test_otlp_http.py -m integration -q
      - name: Stop otel-collector
        if: always()
        run: docker rm -f cisterna-otel || true

  rust-parity:
    runs-on: ubuntu-latest
    env:
      CISTERNA_PRAXIA_ASSETS_REV: 04bb683f11d6e879dcfc5dafbedfed426254985a
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: maraxen/praxia
          ref: ${{ env.CISTERNA_PRAXIA_ASSETS_REV }}
          path: praxia
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            praxia/target
          key: praxia-cargo-${{ env.CISTERNA_PRAXIA_ASSETS_REV }}
      - name: Build bundle-hash
        working-directory: praxia/crates/praxia-agent-assets
        run: cargo build --release --bin bundle-hash
      - run: uv sync
      - name: Rust parity conformance
        env:
          CISTERNA_PRAXIA_ASSETS_BIN: ${{ github.workspace }}/praxia/crates/praxia-agent-assets/target/release/bundle-hash
        run: uv run pytest tests/test_rust_parity.py tests/test_claude_rust_parity.py tests/test_cursor_rust_parity.py tests/test_copilot_rust_parity.py tests/test_antigravity_rust_parity.py tests/test_rust_parity_hook_filter.py -q
